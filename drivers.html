.dc-stat{padding:11px 6px;text-align:center;border-right:1px solid rgba(192,192,192,0.07);}
.dc-stat:last-child{border-right:none;}

.dc-recent-row .rpos{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;min-width:36px;}

// ── HELPERS ──
function buildAvatar(d, size) {
  const cls = size==='lb' ? 'lb-avatar' : 'dc-avatar';
  if (d.photo) return `<div class="${cls}"><img src="${d.photo}" alt="${d.name}" onerror="this.parentElement.textContent='${d.initials}'"></div>`;
  return `<div class="${cls}">${d.initials}</div>`;
}

function seriesLabel(s) {
  if (s==='moonday') return '🌙 Moonday Nights — TCR';
  if (s==='thursday') return '🏁 Thursday Ovals — ARCA';
  return '🌙 Moonday Nights &amp; 🏁 Thursday Ovals';
}

function posColor(pos) {
  if (pos==='1st') return '#ffd700';
  if (pos==='2nd') return '#c0c0c0';
  if (pos==='3rd') return '#cd7f32';
  if (pos==='DNF') return '#cc0000';
  return '#888';
}

        <div class="dc-stat"><div class="v">${mn.incPR||'—'}</div><div class="l">Inc/R</div></div>
      </div>
      <div class="dc-series-label">🏁 Thursday Ovals</div>
      <div class="dc-stats">
        <div class="dc-stat"><div class="v">${th.wins||0}</div><div class="l">Wins</div></div>
        <div class="dc-stat"><div class="v">${th.podiums||0}</div><div class="l">Pods</div></div>
        <div class="dc-stat"><div class="v">${th.avgFinish||'—'}</div><div class="l">Avg Fin</div></div>
        <div class="dc-stat"><div class="v">${th.incPR||'—'}</div><div class="l">Inc/R</div></div>
      </div>`;
  }
  const s = d.stats || {};
  return `<div class="dc-stats">
    <div class="dc-stat"><div class="v">${s.wins||0}</div><div class="l">Wins</div></div>
    <div class="dc-stat"><div class="v">${s.podiums||0}</div><div class="l">Podiums</div></div>
    <div class="dc-stat"><div class="v">${s.avgFinish||'—'}</div><div class="l">Avg Fin</div></div>
    <div class="dc-stat"><div class="v">${s.incPR||'—'}</div><div class="l">Inc/R</div></div>
  </div>`;
}

function buildLbStats(d) {
  if (d.series === 'both') {
    const mn = d.statsMoonday || {};
    const th = d.statsThursday || {};
    return `
      <div class="lb-series-block">
        <div class="lb-series-block-title">🌙 Moonday Nights — TCR</div>
        <div class="lb-stats-grid">
          <div class="lb-stat"><div class="v">${mn.wins||0}</div><div class="l">Wins</div></div>
          <div class="lb-stat"><div class="v">${mn.podiums||0}</div><div class="l">Podiums</div></div>
          <div class="lb-stat"><div class="v">${mn.avgFinish||'—'}</div><div class="l">Avg Finish</div></div>
          <div class="lb-stat"><div class="v">${mn.incPR||'—'}</div><div class="l">Inc / Race</div></div>
        </div>
      </div>
      <div class="lb-series-block">
        <div class="lb-series-block-title">🏁 Thursday Ovals — ARCA</div>
        <div class="lb-stats-grid">
          <div class="lb-stat"><div class="v">${th.wins||0}</div><div class="l">Wins</div></div>
          <div class="lb-stat"><div class="v">${th.podiums||0}</div><div class="l">Podiums</div></div>
          <div class="lb-stat"><div class="v">${th.avgFinish||'—'}</div><div class="l">Avg Finish</div></div>
          <div class="lb-stat"><div class="v">${th.incPR||'—'}</div><div class="l">Inc / Race</div></div>
        </div>
      </div>`;
  }
  const s = d.stats || {};
  return `<div class="lb-stats-grid">
    <div class="lb-stat"><div class="v">${s.wins||0}</div><div class="l">Wins</div></div>
    <div class="lb-stat"><div class="v">${s.podiums||0}</div><div class="l">Podiums</div></div>
    <div class="lb-stat"><div class="v">${s.avgFinish||'—'}</div><div class="l">Avg Finish</div></div>
    <div class="lb-stat"><div class="v">${s.incPR||'—'}</div><div class="l">Inc / Race</div></div>
  </div>`;
}

function renderCards(filter) {
  const grid = document.getElementById('driversGrid');
  const list = filter==='all' ? DRIVERS : DRIVERS.filter(d=>d.series===filter||d.series==='both');
  if (!list.length) { grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px;color:#555;font-family:'Rajdhani',sans-serif;letter-spacing:0.1em;text-transform:uppercase;">No drivers in this series yet</div>`; return; }
  grid.innerHTML = list.map(d => `
    <div class="driver-card" onclick="openLightbox(${DRIVERS.indexOf(d)})">
      <div class="dc-banner"></div>
      <div class="dc-top">
        ${buildAvatar(d,'card')}
        <div class="dc-identity">
          <div class="dc-number">${d.number}</div>
          <div class="dc-name">${d.name}</div>
          <div class="dc-series">${seriesLabel(d.series)}</div>
        </div>
      </div>
      <div class="dc-bio">${d.bio}</div>
      ${buildStats(d)}
      <div class="dc-recent">
        <div class="dc-recent-title">Recent Results</div>
        ${d.recent.map(r=>`<div class="dc-recent-row"><span class="rpos" style="color:${r.posColor||posColor(r.pos)}">${r.pos}</span><span>${r.track}</span><span style="color:#888;font-size:0.75rem;">${r.series}</span></div>`).join('')}
      </div>
      <div class="dc-expand-hint">▲ Click to expand full profile</div>
    </div>`).join('');
}

function openLightbox(idx) {
  const d = DRIVERS[idx];
  document.getElementById('lbContent').innerHTML = `
    <div class="lb-header">
      ${buildAvatar(d,'lb')}
      <div class="lb-identity">
        <div class="lb-number">${d.number}</div>
        <div class="lb-name">${d.name}</div>
        <div class="lb-series-tag">${seriesLabel(d.series)}</div>
      </div>
    </div>
    <div class="lb-bio">${d.bio}</div>
    <div class="lb-section">
      <div class="lb-section-title">2026 Season 2 Stats</div>
      ${buildLbStats(d)}
    </div>
    <div class="lb-section">
      <div class="lb-section-title">Recent Race History</div>
      <table class="lb-history-table">
        <thead><tr><th>Pos</th><th>Track</th><th>Series</th></tr></thead>
        <tbody>${d.recent.map(r=>`<tr><td class="hpos" style="color:${r.posColor||posColor(r.pos)}">${r.pos}</td><td>${r.track}</td><td style="color:#888;">${r.series}</td></tr>`).join('')}</tbody>
      </table>
    </div>
    ${d.fav?`<div class="lb-section"><div class="lb-section-title">Driver Favorites</div><div class="lb-fav"><div class="lb-fav-item">🚗 Car: <span>${d.fav.car}</span></div><div class="lb-fav-item">🏁 Track: <span>${d.fav.track}</span></div></div></div>`:''}`;
  document.getElementById('lbOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeLightbox() { document.getElementById('lbOverlay').classList.remove('open'); document.body.style.overflow=''; }
function closeLB(e) { if(e.target===document.getElementById('lbOverlay')) closeLightbox(); }
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
function filterDrivers(f,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCards(f);}

renderCards('all');
</script>
<script>document.querySelectorAll(".yr").forEach(function(e){e.textContent=new Date().getFullYear();});</script>
</body>
</html>
