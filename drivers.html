<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Drivers · Ten10 Motorsports</title>

<style>
/* ── DRIVER GRID ── */
.drivers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}

.driver-card{
  background:#141414;border:1px solid rgba(192,192,192,0.12);border-radius:8px;
  overflow:hidden;cursor:pointer;
  transition:border-color 0.25s,box-shadow 0.25s,transform 0.2s;
  position:relative;
}
.driver-card:hover{
  border-color:rgba(204,0,0,0.55);
  box-shadow:0 8px 36px rgba(204,0,0,0.28);
  transform:translateY(-3px);
}
.driver-card:hover .dc-expand-hint{opacity:1;}

.dc-banner{height:5px;background:linear-gradient(90deg,#cc0000,#8a0000);}

.dc-top{padding:18px 18px 0;display:flex;align-items:flex-start;gap:14px;}

.dc-avatar{
  width:68px;height:68px;border-radius:6px;object-fit:cover;
  border:2px solid rgba(204,0,0,0.45);flex-shrink:0;background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.7rem;color:#cc0000;
  overflow:hidden;
}
.dc-avatar img{width:100%;height:100%;object-fit:cover;}

.dc-identity{flex:1;min-width:0;}
.dc-number{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:2.6rem;color:#cc0000;line-height:1;letter-spacing:-0.02em;}
.dc-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.25rem;color:#f0f0f0;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dc-series{font-family:'Rajdhani',sans-serif;font-size:0.73rem;letter-spacing:0.1em;text-transform:uppercase;color:#888;margin-top:3px;}

.dc-bio{padding:12px 18px;font-size:0.86rem;color:#aaa;line-height:1.5;border-bottom:1px solid rgba(192,192,192,0.07);}

.dc-stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid rgba(192,192,192,0.07);}
.dc-stat{padding:11px 6px;text-align:center;border-right:1px solid rgba(192,192,192,0.07);}
.dc-stat:last-child{border-right:none;}
.dc-stat .v{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.45rem;color:#ff1a1a;line-height:1;}
.dc-stat .l{font-family:'Rajdhani',sans-serif;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:#555;margin-top:2px;}

.dc-recent{padding:11px 18px 14px;}
.dc-recent-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:#888;margin-bottom:7px;}
.dc-recent-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid rgba(192,192,192,0.05);font-family:'Rajdhani',sans-serif;font-size:0.8rem;}
.dc-recent-row:last-child{border-bottom:none;}
.dc-recent-row .rpos{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;color:#888;min-width:32px;}

.dc-expand-hint{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(204,0,0,0.18));
  padding:16px 18px 10px;
  font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.7rem;
  letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,26,26,0.7);
  text-align:center;opacity:0;transition:opacity 0.2s;pointer-events:none;
}

/* ── LIGHTBOX ── */
.lb-overlay{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,0.88);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:20px;
  animation:lb-fade-in 0.2s ease;
}
.lb-overlay.open{display:flex;}
@keyframes lb-fade-in{from{opacity:0;}to{opacity:1;}}

.lb-box{
  background:#141414;border:1px solid rgba(204,0,0,0.4);border-radius:10px;
  max-width:680px;width:100%;max-height:90vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.7),0 0 40px rgba(204,0,0,0.2);
  animation:lb-slide-in 0.25s ease;
  position:relative;
}
@keyframes lb-slide-in{from{transform:scale(0.94) translateY(12px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}

.lb-close{
  position:absolute;top:14px;right:16px;
  background:rgba(204,0,0,0.15);border:1px solid rgba(204,0,0,0.3);
  border-radius:50%;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;
  color:#888;cursor:pointer;transition:all 0.2s;z-index:1;
}
.lb-close:hover{background:rgba(204,0,0,0.35);color:#fff;}

.lb-banner{height:6px;background:linear-gradient(90deg,#cc0000,#8a0000);border-radius:10px 10px 0 0;}

.lb-header{padding:24px 24px 0;display:flex;align-items:flex-start;gap:20px;}
.lb-avatar{

.lb-avatar img{width:100%;height:100%;object-fit:cover;}
.lb-identity{flex:1;}
.lb-number{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:3.5rem;color:#cc0000;line-height:1;letter-spacing:-0.02em;}

.lb-section:last-child{border-bottom:none;padding-bottom:24px;}
.lb-section-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:0.16em;text-transform:uppercase;color:#cc0000;margin-bottom:12px;}

.lb-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.lb-stat{background:#1a1a1a;border:1px solid rgba(192,192,192,0.08);border-radius:5px;padding:12px 8px;text-align:center;}
.lb-stat .v{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.7rem;color:#ff1a1a;line-height:1;}
.lb-stat .l{font-family:'Rajdhani',sans-serif;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:#555;margin-top:3px;}

.lb-history-table{width:100%;border-collapse:collapse;font-family:'Rajdhani',sans-serif;font-size:0.88rem;}
.lb-history-table th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:#666;padding:6px 10px;text-align:left;border-bottom:1px solid rgba(192,192,192,0.08);}

.lb-fav{display:flex;gap:20px;flex-wrap:wrap;}

@media(max-width:600px){
  .lb-stats-grid{grid-template-columns:repeat(2,1fr);}
  .lb-header{flex-direction:column;align-items:center;text-align:center;}

// ── BUILD CARDS ──
function buildAvatar(driver, size='card') {
  if (driver.photo) {
    return `<div class="${size==='lb'?'lb-avatar':'dc-avatar'}"><img src="${driver.photo}" alt="${driver.name}" onerror="this.parentElement.textContent='${driver.initials}'"></div>`;
  }
  return `<div class="${size==='lb'?'lb-avatar':'dc-avatar'}">${driver.initials}</div>`;
}

function seriesLabel(s) {
  if (s === 'moonday') return '🌙 Moonday Nights';
  if (s === 'thursday') return '🏁 Thursday Ovals';
  return '🌙 Moonday Nights · 🏁 Thursday Ovals';
}

function posColor(pos) {
  if (pos === '1st') return '#ffd700';
  if (pos === '2nd') return '#c0c0c0';
  if (pos === '3rd') return '#cd7f32';
  if (pos === 'DNF') return '#cc0000';
  return '#888';
}

function renderCards(filter='all') {
  const grid = document.getElementById('driversGrid');
  const filtered = filter === 'all' ? DRIVERS : DRIVERS.filter(d => d.series === filter || d.series === 'both');

  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#555;font-family:'Rajdhani',sans-serif;letter-spacing:0.1em;text-transform:uppercase;">No drivers in this series yet</div>`;
    return;
  }

  grid.innerHTML = filtered.map((d, i) => `
    <div class="driver-card" onclick="openLightbox(${DRIVERS.indexOf(d)})" data-series="${d.series}">
      <div class="dc-banner"></div>
      <div class="dc-top">
        ${buildAvatar(d, 'card')}
        <div class="dc-identity">
          <div class="dc-number">${d.number}</div>
          <div class="dc-name">${d.name}</div>
          <div class="dc-series">${seriesLabel(d.series)}</div>
        </div>
      </div>
      <div class="dc-bio">${d.bio}</div>
      <div class="dc-stats">
        <div class="dc-stat"><div class="v">${d.stats.wins}</div><div class="l">Wins</div></div>
        <div class="dc-stat"><div class="v">${d.stats.podiums}</div><div class="l">Podiums</div></div>
        <div class="dc-stat"><div class="v">${d.stats.poles}</div><div class="l">Poles</div></div>
        <div class="dc-stat"><div class="v">${d.stats.avgFinish}</div><div class="l">Avg Fin</div></div>
      </div>
      <div class="dc-recent">
        <div class="dc-recent-title">Recent Results</div>
        ${d.recent.length ? d.recent.map(r => `
          <div class="dc-recent-row">
            <span class="rpos" style="color:${r.posColor||posColor(r.pos)}">${r.pos}</span>
            <span>${r.track}</span>
            <span style="color:#888;font-size:0.75rem;">${r.series}</span>
          </div>`).join('') : `<div class="dc-recent-row"><span style="color:#555;">No results yet</span></div>`}
      </div>
      <div class="dc-expand-hint">▲ Click to expand full profile</div>
    </div>
  `).join('');
}

// ── LIGHTBOX ──
function openLightbox(idx) {
  const d = DRIVERS[idx];
  const lb = document.getElementById('lbOverlay');
  const content = document.getElementById('lbContent');

  content.innerHTML = `
    <div class="lb-header">
      ${buildAvatar(d, 'lb')}
      <div class="lb-identity">
        <div class="lb-number">${d.number}</div>
        <div class="lb-name">${d.name}</div>
        <div class="lb-series">${seriesLabel(d.series)}</div>
      </div>
    </div>

    <div class="lb-bio">${d.bio}</div>

    <div class="lb-section">
      <div class="lb-section-title">2026 Season 2 Stats</div>
      <div class="lb-stats-grid">
        <div class="lb-stat"><div class="v">${d.stats.wins}</div><div class="l">Wins</div></div>
        <div class="lb-stat"><div class="v">${d.stats.podiums}</div><div class="l">Podiums</div></div>
        <div class="lb-stat"><div class="v">${d.stats.poles}</div><div class="l">Poles</div></div>
        <div class="lb-stat"><div class="v">${d.stats.avgFinish}</div><div class="l">Avg Finish</div></div>
      </div>
    </div>

    <div class="lb-section">
      <div class="lb-section-title">Recent Race History</div>
      ${d.recent.length ? `
      <table class="lb-history-table">
        <thead><tr><th>Pos</th><th>Track</th><th>Series</th></tr></thead>
        <tbody>
          ${d.recent.map(r=>`
            <tr>
              <td class="hpos" style="color:${r.posColor||posColor(r.pos)}">${r.pos}</td>
              <td>${r.track}</td>
              <td style="color:#888;">${r.series}</td>
            </tr>`).join('')}
        </tbody>
      </table>` : `<p style="color:#555;font-family:'Rajdhani',sans-serif;font-size:0.85rem;">No race history yet</p>`}
    </div>

    ${d.fav ? `
    <div class="lb-section">
      <div class="lb-section-title">Driver Favorites</div>
      <div class="lb-fav">
        <div class="lb-fav-item">🚗 Favorite Car: <span>${d.fav.car}</span></div>
        <div class="lb-fav-item">🏁 Favorite Track: <span>${d.fav.track}</span></div>
      </div>
    </div>` : ''}
  `;

  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lbOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeLB(e) {
  if (e.target === document.getElementById('lbOverlay')) closeLightbox();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

function filterDrivers(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(filter);
}

// Init
renderCards('all');
</script>
<script>document.querySelectorAll(".yr").forEach(function(e){e.textContent=new Date().getFullYear();});</script>
</body>
</html>
